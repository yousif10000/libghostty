name: Build Zig for iOS

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      
      - name: install Zig
        run: |
          brew install zig@0.15

      - name: get libghostty
        run: |
          wget https://release.files.ghostty.org/1.3.1/ghostty-1.3.1.tar.gz
          tar -xf ghostty-1.3.1.tar.gz 
          ls
          

name: Build Zig for iOS

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      
      - name: install Zig
        run: |
          brew install zig@0.15

      - name: get libghostty
        run: |
          wget https://release.files.ghostty.org/1.3.1/ghostty-1.3.1.tar.gz
          tar -xf ghostty-1.3.1.tar.gz 
          mv ghostty-1.3.1 ghostty

      - name: build fot ios
        run: |
          cd ghostty
          zig build lib-vt -Dtarget=aarch64-ios.12.0 -Dsimd=true -Doptimize=ReleaseFast
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
         name: libghostty
         path: ghostty/zig-out/
